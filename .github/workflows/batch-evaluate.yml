name: Batch Prepare Offers for Copilot

on:
  workflow_dispatch:
    inputs:
      max_offers:
        description: 'Maximum number of offers to process'
        required: false
        default: '10'
      retry_failed:
        description: 'Only retry previously failed offers'
        required: false
        default: 'false'

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.parse.outputs.matrix }}
      count: ${{ steps.parse.outputs.count }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Parse batch input
        id: parse
        run: |
          node -e "
          const fs = require('fs');
          const max = parseInt('${{ inputs.max_offers }}') || 10;
          const retryOnly = '${{ inputs.retry_failed }}' === 'true';

          // Read pipeline.md for pending URLs
          let urls = [];
          const pipelinePath = 'data/pipeline.md';
          if (fs.existsSync(pipelinePath)) {
            const content = fs.readFileSync(pipelinePath, 'utf8');
            const lines = content.split('\n');
            for (const line of lines) {
              const match = line.match(/^- \[ \] (.+?)(?:\s*\|\s*(.+?))?(?:\s*\|\s*(.+?))?$/);
              if (match) {
                urls.push({
                  url: match[1].trim(),
                  company: (match[2] || '').trim(),
                  title: (match[3] || '').trim()
                });
              }
            }
          }

          // Also check batch-input.tsv
          const batchPath = 'batch/batch-input.tsv';
          if (fs.existsSync(batchPath)) {
            const content = fs.readFileSync(batchPath, 'utf8');
            for (const line of content.split('\n').slice(1)) {
              const cols = line.split('\t');
              if (cols.length >= 2 && cols[1]) {
                urls.push({ url: cols[1].trim(), company: cols[2] || '', title: cols[3] || '' });
              }
            }
          }

          // Check batch-state for retry mode
          if (retryOnly) {
            const statePath = 'batch/batch-state.tsv';
            if (fs.existsSync(statePath)) {
              const stateContent = fs.readFileSync(statePath, 'utf8');
              const failedUrls = new Set();
              for (const line of stateContent.split('\n').slice(1)) {
                const cols = line.split('\t');
                if (cols[2] === 'failed') failedUrls.add(cols[1]);
              }
              urls = urls.filter(u => failedUrls.has(u.url));
            }
          }

          const selected = urls.slice(0, max);
          const matrix = selected.map((u, i) => ({
            id: i + 1,
            url: u.url,
            company: u.company,
            title: u.title
          }));

          const fs2 = require('fs');
          fs2.appendFileSync(process.env.GITHUB_OUTPUT, 'matrix=' + JSON.stringify({include: matrix}) + '\n');
          fs2.appendFileSync(process.env.GITHUB_OUTPUT, 'count=' + matrix.length + '\n');
          console.log('Found', matrix.length, 'offers to process');
          "

  collect:
    needs: prepare
    if: ${{ needs.prepare.outputs.count != '' && fromJSON(needs.prepare.outputs.count) > 0 }}
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
      max-parallel: 2
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install && npx playwright install chromium

      - name: Collect JD and Copilot handoff
        id: fetch_jd
        env:
          OFFER_URL: ${{ matrix.url }}
          OFFER_ID: ${{ matrix.id }}
          OFFER_COMPANY: ${{ matrix.company }}
          OFFER_TITLE: ${{ matrix.title }}
        run: |
          node --input-type=module <<'NODE'
          import { mkdirSync, writeFileSync } from 'fs';
          import { chromium } from 'playwright';

          const url = process.env.OFFER_URL;
          const id = process.env.OFFER_ID;
          const company = process.env.OFFER_COMPANY || '';
          const title = process.env.OFFER_TITLE || '';

          mkdirSync('batch/copilot-handoffs', { recursive: true });

          function htmlToText(html) {
            return html
              .replace(/<script[^>]*>[\s\S]*?<\/script>/gi, ' ')
              .replace(/<style[^>]*>[\s\S]*?<\/style>/gi, ' ')
              .replace(/<[^>]+>/g, ' ')
              .replace(/\s+/g, ' ')
              .trim();
          }

          async function fetchBasic() {
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 15000);
            try {
              const resp = await fetch(url, {
                signal: controller.signal,
                headers: {
                  'user-agent': 'career-ops-copilot-batch/1.0'
                }
              });
              clearTimeout(timeout);
              if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
              return htmlToText(await resp.text());
            } catch (err) {
              clearTimeout(timeout);
              throw err;
            }
          }

          async function fetchWithPlaywright() {
            const browser = await chromium.launch({ headless: true });
            try {
              const page = await browser.newPage();
              await page.goto(url, { waitUntil: 'networkidle', timeout: 30000 });
              return (await page.locator('body').innerText({ timeout: 5000 })).trim();
            } finally {
              await browser.close();
            }
          }

          let text = '';
          let method = 'basic-fetch';
          try {
            text = await fetchBasic();
            if (text.length < 500) {
              method = 'playwright';
              text = await fetchWithPlaywright();
            }
          } catch (err) {
            method = 'playwright';
            try {
              text = await fetchWithPlaywright();
            } catch (fallbackErr) {
              const message = `FETCH_FAILED: ${fallbackErr.message}`;
              writeFileSync(`batch/jd-${id}.txt`, message);
              throw new Error(`${err.message}; Playwright fallback failed: ${fallbackErr.message}`);
            }
          }

          const jdPath = `batch/jd-${id}.txt`;
          const handoffPath = `batch/copilot-handoffs/${id}.md`;
          writeFileSync(jdPath, text.slice(0, 20000));
          writeFileSync(handoffPath, `# Copilot Batch Handoff ${id}

URL: ${url}
Company: ${company}
Title: ${title}
Extraction method: ${method}
JD artifact: ${jdPath}

Use the @batch or @evaluator Copilot agent to evaluate this JD artifact. The Actions workflow only collects inputs; it does not perform AI reasoning or write tracker TSVs.
`);
          console.log(`JD extracted via ${method}: ${text.length} chars`);
          NODE

      - name: Log result
        if: always()
        run: |
          echo "Offer ${{ matrix.id }}: ${{ matrix.url }}"
          echo "Company: ${{ matrix.company }}"
          echo "Status: ${{ job.status }}"
          echo "JD saved to batch/jd-${{ matrix.id }}.txt"
          echo "Copilot handoff saved to batch/copilot-handoffs/${{ matrix.id }}.md"

      - name: Upload JD and handoff artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: copilot-batch-${{ matrix.id }}
          path: |
            batch/jd-${{ matrix.id }}.txt
            batch/copilot-handoffs/${{ matrix.id }}.md

  merge:
    needs: [prepare, collect]
    if: ${{ always() && needs.prepare.outputs.count != '' && fromJSON(needs.prepare.outputs.count) > 0 }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: batch/artifacts/

      - name: Check tracker additions
        run: node merge-tracker.mjs

      - name: Run pipeline verification
        run: node verify-pipeline.mjs

      - name: Summary
        run: |
          echo "## Batch JD Collection Complete" >> $GITHUB_STEP_SUMMARY
          echo "Collected: ${{ needs.prepare.outputs.count }} offer artifacts" >> $GITHUB_STEP_SUMMARY
          echo "Download the copilot-batch-* artifacts, then use @batch or @evaluator to complete AI evaluation." >> $GITHUB_STEP_SUMMARY
