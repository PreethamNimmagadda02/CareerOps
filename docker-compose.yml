services:
  db:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Web UI (http://localhost:9001)
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $$MINIO_ACCESS_KEY $$MINIO_SECRET_KEY &&
        mc mb --ignore-existing local/$$MINIO_BUCKET &&
        mc anonymous set download local/$$MINIO_BUCKET &&
        echo '✅ MinIO bucket ready (anonymous download enabled)'
      "
    restart: "no"

  dynamodb:
    image: amazon/dynamodb-local:latest
    container_name: dynamodb
    restart: unless-stopped
    ports:
      - "8000:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath /home/dynamodblocal/data"
    user: root
    volumes:
      - dynamodb_data:/home/dynamodblocal/data

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data

  dynamo-init:
    build:
      context: .
      target: init
    container_name: dynamo-init
    depends_on:
      dynamodb:
        condition: service_started
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      - DYNAMODB_ENDPOINT=http://dynamodb:8000
      - DYNAMODB_REGION=${DYNAMODB_REGION:-us-east-1}
      - DYNAMODB_TABLE_CV=${DYNAMODB_TABLE_CV:-CVs}
      - DYNAMODB_TABLE_PROFILE=${DYNAMODB_TABLE_PROFILE:-Profiles}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-local}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-local}
    volumes:
      - ./cv.md:/app/cv.md
      - ./config:/app/config
      - ./.env:/app/.env
    restart: "no"

  # One-shot schema migration — runs `prisma migrate deploy` against the DB
  # before anything that reads/writes the schema starts. Without this, a fresh
  # deploy boots the app/worker straight into a schema missing this release's
  # tables (e.g. Job, Posting).
  migrate:
    build:
      context: .
      target: init
    container_name: migrate
    command: ["run", "db:migrate:deploy"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
    restart: "no"

  app:
    build:
      context: .
      target: runtime
    container_name: app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Use the docker-compose service name `db` instead of localhost
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      - NODE_ENV=production
      # Shared KV (rate limits + caches). Enables running >1 app instance;
      # omit to fall back to per-process in-memory state (single node).
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      # Auth.js (NextAuth) — required for the multi-user dashboard.
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_URL=${AUTH_URL:-http://localhost:3000}
      - AUTH_TRUST_HOST=true
      - AUTH_GOOGLE_ID=${AUTH_GOOGLE_ID:-}
      - AUTH_GOOGLE_SECRET=${AUTH_GOOGLE_SECRET:-}
      - AUTH_GITHUB_ID=${AUTH_GITHUB_ID:-}
      - AUTH_GITHUB_SECRET=${AUTH_GITHUB_SECRET:-}
      # MinIO S3 — internal Docker network URL (used for SDK calls)
      - MINIO_ENDPOINT=http://minio:9000
      # Browser-reachable URL baked into stored reportUrl values. The host port
      # 9000 is published, so localhost works from the user's browser.
      - MINIO_PUBLIC_ENDPOINT=${MINIO_PUBLIC_ENDPOINT:-http://localhost:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=${MINIO_BUCKET}
      # DynamoDB Local — internal Docker network URL
      - DYNAMODB_ENDPOINT=http://dynamodb:8000
      - DYNAMODB_REGION=${DYNAMODB_REGION:-us-east-1}
      - DYNAMODB_TABLE_CV=${DYNAMODB_TABLE_CV:-CVs}
      - DYNAMODB_TABLE_PROFILE=${DYNAMODB_TABLE_PROFILE:-Profiles}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-local}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-local}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
      dynamo-init:
        condition: service_completed_successfully
    volumes:
      # Map the necessary data directories so config persists
      - ./data:/app/data
      - ./config:/app/config
      - ./cv.md:/app/cv.md
      # Mount the local `.env` if API keys are needed inside the container
      - ./.env:/app/.env

  # Shared portal scanner — runs the global scan on an interval, filling the
  # `Posting` corpus ONCE for all users (seeds immediately on startup, then
  # every SCAN_INTERVAL_SECONDS). In AWS this maps to an EventBridge schedule
  # firing an ECS task running `career-ops-scan-portals`.
  scan-scheduler:
    build:
      context: .
      target: runtime
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        while true; do
          echo "[scan-scheduler] starting global scan $(date -u)";
          node dist/cli/scan-portals.js --fallback --concurrency 12 --browser-concurrency 8 || echo "[scan-scheduler] scan failed";
          echo "[scan-scheduler] sleeping ${SCAN_INTERVAL_SECONDS:-21600}s";
          sleep ${SCAN_INTERVAL_SECONDS:-21600};
        done
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      - NODE_ENV=production
      - SCAN_INTERVAL_SECONDS=${SCAN_INTERVAL_SECONDS:-21600}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      - ./.env:/app/.env

  # Pipeline worker — consumes the Postgres job queue and runs the heavy
  # per-user match + evaluate work OFF the web tier. Scale horizontally with
  # `docker compose up -d --scale worker=N`; each replica claims jobs
  # independently via FOR UPDATE SKIP LOCKED.
  worker:
    build:
      context: .
      target: runtime
    restart: unless-stopped
    # Override the image's default web CMD (entrypoint is `npm`).
    command: ["run", "worker:prod"]
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      - NODE_ENV=production
      - WORKER_CONCURRENCY=${WORKER_CONCURRENCY:-2}
      # Enables the job-queued pub/sub nudge (src/lib/job-signal.ts) so a
      # freshly enqueued job doesn't wait out the idle-poll backoff; omit to
      # fall back to polling only.
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      # MinIO S3 — internal Docker network URL (used for SDK calls)
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_PUBLIC_ENDPOINT=${MINIO_PUBLIC_ENDPOINT:-http://localhost:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=${MINIO_BUCKET}
      # DynamoDB Local — internal Docker network URL
      - DYNAMODB_ENDPOINT=http://dynamodb:8000
      - DYNAMODB_REGION=${DYNAMODB_REGION:-us-east-1}
      - DYNAMODB_TABLE_CV=${DYNAMODB_TABLE_CV:-CVs}
      - DYNAMODB_TABLE_PROFILE=${DYNAMODB_TABLE_PROFILE:-Profiles}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-local}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-local}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
      dynamo-init:
        condition: service_completed_successfully
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      - ./cv.md:/app/cv.md
      # LLM provider keys (NVIDIA_API_KEY, etc.) are read from the mounted .env.
      - ./.env:/app/.env

volumes:
  pgdata:
  minio_data:
  dynamodb_data:
  redis_data:
