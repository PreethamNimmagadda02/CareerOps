version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: careerops
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d careerops" ]
      interval: 5s
      timeout: 5s
      retries: 5

  nextcloud-db:
    image: mariadb:11
    container_name: nextcloud-db
    environment:
      MYSQL_ROOT_PASSWORD: nextcloud_root
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: nextcloud
    volumes:
      - nextcloud_db:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      interval: 10s
      timeout: 5s
      retries: 5

  nextcloud:
    image: nextcloud:apache
    container_name: nextcloud
    ports:
      - "8090:80"
    environment:
      MYSQL_HOST: nextcloud-db
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: nextcloud
      NEXTCLOUD_ADMIN_USER: admin
      NEXTCLOUD_ADMIN_PASSWORD: careerops123
      NEXTCLOUD_TRUSTED_DOMAINS: localhost nextcloud
    depends_on:
      nextcloud-db:
        condition: service_healthy
    volumes:
      - nextcloud_data:/var/www/html

  app:
    build:
      context: .
      target: runtime
    container_name: app
    ports:
      - "3000:3000"
    environment:
      # Use the docker-compose service name `db` instead of localhost
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/careerops?schema=public
      - NODE_ENV=production
      # Nextcloud WebDAV — internal Docker network URL
      - NEXTCLOUD_URL=http://nextcloud:80
      - NEXTCLOUD_USER=admin
      - NEXTCLOUD_PASSWORD=careerops123
    depends_on:
      db:
        condition: service_healthy
      nextcloud:
        condition: service_started
    volumes:
      # Map the necessary data directories so config persists
      - ./data:/app/data
      - ./config:/app/config
      - ./portals.yml:/app/portals.yml
      - ./cv.md:/app/cv.md
      # Mount the local `.env` if API keys are needed inside the container
      - ./.env:/app/.env

volumes:
  pgdata:
  nextcloud_db:
  nextcloud_data:
