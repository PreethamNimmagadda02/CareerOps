services:
  db:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Web UI (http://localhost:9001)
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $$MINIO_ACCESS_KEY $$MINIO_SECRET_KEY &&
        mc mb --ignore-existing local/$$MINIO_BUCKET &&
        mc anonymous set download local/$$MINIO_BUCKET &&
        echo '✅ MinIO bucket ready (anonymous download enabled)'
      "
    restart: "no"

  dynamodb:
    image: amazon/dynamodb-local:latest
    container_name: dynamodb
    ports:
      - "8000:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath /home/dynamodblocal/data"
    user: root
    volumes:
      - dynamodb_data:/home/dynamodblocal/data

  dynamo-init:
    build:
      context: .
      target: init
    container_name: dynamo-init
    depends_on:
      dynamodb:
        condition: service_started
    environment:
      - DYNAMODB_ENDPOINT=http://dynamodb:8000
      - DYNAMODB_REGION=${DYNAMODB_REGION:-us-east-1}
      - DYNAMODB_TABLE_CV=${DYNAMODB_TABLE_CV:-CVs}
      - DYNAMODB_TABLE_PROFILE=${DYNAMODB_TABLE_PROFILE:-Profiles}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-local}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-local}
    volumes:
      - ./cv.md:/app/cv.md
      - ./config:/app/config
      - ./.env:/app/.env
    restart: "no"

  app:
    build:
      context: .
      target: runtime
    container_name: app
    ports:
      - "3000:3000"
    environment:
      # Use the docker-compose service name `db` instead of localhost
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      - NODE_ENV=production
      # MinIO S3 — internal Docker network URL (used for SDK calls)
      - MINIO_ENDPOINT=http://minio:9000
      # Browser-reachable URL baked into stored reportUrl values. The host port
      # 9000 is published, so localhost works from the user's browser.
      - MINIO_PUBLIC_ENDPOINT=${MINIO_PUBLIC_ENDPOINT:-http://localhost:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=${MINIO_BUCKET}
      # DynamoDB Local — internal Docker network URL
      - DYNAMODB_ENDPOINT=http://dynamodb:8000
      - DYNAMODB_REGION=${DYNAMODB_REGION:-us-east-1}
      - DYNAMODB_TABLE_CV=${DYNAMODB_TABLE_CV:-CVs}
      - DYNAMODB_TABLE_PROFILE=${DYNAMODB_TABLE_PROFILE:-Profiles}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-local}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-local}
    depends_on:
      db:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      dynamo-init:
        condition: service_completed_successfully
    volumes:
      # Map the necessary data directories so config persists
      - ./data:/app/data
      - ./config:/app/config
      - ./cv.md:/app/cv.md
      # Mount the local `.env` if API keys are needed inside the container
      - ./.env:/app/.env

volumes:
  pgdata:
  minio_data:
  dynamodb_data:
